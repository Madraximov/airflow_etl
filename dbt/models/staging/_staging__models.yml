version: 2

models:
  - name: stg_customers
    description: Cleaned, de-duplicated customers.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: segment
        data_tests:
          - accepted_values:
              values: ['Consumer', 'Corporate', 'Home Office']

  - name: stg_orders
    description: Cleaned & typed order lines, one row per order/product line.
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: quantity
        data_tests:
          - not_null
      - name: sales
        data_tests:
          - not_null
