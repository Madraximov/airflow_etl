version: 2

models:
  - name: dim_date
    description: Calendar date dimension, grain = one row per day.
    columns:
      - name: date_key
        description: YYYYMMDD integer surrogate key.
        data_tests:
          - not_null
          - unique
      - name: full_date
        data_tests:
          - not_null

  - name: dim_customer
    description: Customer dimension (current records).
    columns:
      - name: customer_key
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: dim_product
    description: Product dimension (current records).
    columns:
      - name: product_key
        data_tests:
          - not_null
          - unique
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: dim_geography
    description: Geography dimension at city/state/country grain.
    columns:
      - name: geo_key
        data_tests:
          - not_null
          - unique

  - name: fact_sales
    description: Sales fact at order-line grain.
    columns:
      - name: sale_key
        data_tests:
          - not_null
          - unique
      # ---- replaces DQ check 1: no NULL foreign keys ---------------------
      - name: order_date_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: ship_date_key
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: customer_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: product_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: geo_key
        data_tests:
          - relationships:
              to: ref('dim_geography')
              field: geo_key
